services:
  backend:
    build:
      context: ./flask_almacen
    container_name: flask_api
    volumes:
      - ./flask_almacen/instance:/app/instance
    expose:
      - "5000"
    networks:
      - app_network

  frontend:
    build:
      context: ./my-app
    container_name: vite_frontend
    ports:
      - "5137:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network: